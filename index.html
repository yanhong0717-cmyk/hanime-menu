<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanime 選單測試</title>
    <style>
        body {background:#1a0033; color:white; font-family:sans-serif; padding:15px;}
        h1 {text-align:center; color:#ff4da6;}
        .item {padding:15px; background:rgba(255,255,255,0.1); margin:10px 0; border-radius:10px;}
        button {width:100%; padding:18px; margin:10px 0; border:none; border-radius:12px; font-size:18px;}
    </style>
</head>
<body>
    <h1>Hanime 選單測試版</h1>
    
    <button onclick="openSelected()">🚀 開啟選取的影片</button>
    <button onclick="copySelected()">📋 複製連結</button>

    <div id="list"></div>

    <script>
        const items = [
            {n:1, t:"春羽しか VT 3D", u:"https://hanime1.me/watch?v=406030"},
            {n:2, t:"回到童年", u:"https://hanime1.me/watch?v=22360"},
            {n:5, t:"肛門狂熱宅男...", u:"https://hanime1.me/watch?v=404980"},
            {n:15, t:"3DCG酪梨", u:"https://hanime1.me/watch?v=100005"},
            {n:27, t:"御宅的我與極品校花...", u:"https://hanime1.me/watch?v=405932"}
        ];

        let html = '';
        items.forEach(item => {
            html += `<div class="item"><input type="checkbox" value="${item.n}"> ${item.n}. ${item.t}</div>`;
        });
        document.getElementById('list').innerHTML = html;

        function openSelected() {
            document.querySelectorAll('input:checked').forEach((cb,i) => {
                const id = parseInt(cb.value);
                const found = items.find(x => x.n === id);
                if (found) setTimeout(() => window.open(found.u, '_blank'), i*500);
            });
        }

        function copySelected() {
            let links = [];
            document.querySelectorAll('input:checked').forEach(cb => {
                const id = parseInt(cb.value);
                const found = items.find(x => x.n === id);
                if (found) links.push(found.u);
            });
            if (links.length > 0) {
                navigator.clipboard.writeText(links.join('\n'));
                alert('已複製 ' + links.length + ' 個連結');
            }
        }
    </script>
</body>
</html>
